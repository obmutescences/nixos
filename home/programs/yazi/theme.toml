# vim:fileencoding=utf-8:foldmethod=marker

#:schema https://yazi-rs.github.io/schemas/theme.json

# : Manager {{{

[mgr]
cwd = { fg = "#83a598" }

# Find
find_keyword  = { fg = "#b8bb26", italic = true }
find_position = { fg = "#fe8019", bg = "reset", italic = true }

# Marker
marker_selected = { fg = "#b8bb26", bg = "#b8bb26" }
marker_copied   = { fg = "#b8bb26", bg = "#b8bb26" }
marker_cut      = { fg = "#fb4934", bg = "#fb4934" }

# Border
border_symbol = "│"
border_style  = { fg = "#665c54" }

# Highlighting
# syntect_theme = "~/.config/yazi/Gruvbox-Dark.tmTheme"

# : }}}


# : Tabs {{{

[tabs]
active   = { fg = "#282828", bg = "#504945" }
inactive = { fg = "#a89984", bg = "#3c3836" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}


# : Indicator of hovered file {{{

[indicator]
parent  = { fg = "#282828", bg = "#83a598" }
current = { fg = "#282828", bg = "#83a598" }
preview = { underline = true }
padding = { open = "", close = "" }

# : }}}


# : Mode {{{

[mode]
normal_main = { fg = "#282828", bg = "#A89984", bold = true }
normal_alt  = { fg = "#282828", bg = "#A89984", bold = true }
select_main = { fg = "#282828", bg = "#b8bb26", bold = true }
select_alt  = { fg = "#282828", bg = "#b8bb26", bold = true }
unset_main  = { fg = "#282828", bg = "#d3869b", bold = true }
unset_alt   = { fg = "#282828", bg = "#d3869b", bold = true }

# : }}}


# : Status bar {{{

[status]
overall   = {}
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_type  = { fg = "#504945" }
perm_read  = { fg = "#b8bb26" }
perm_write = { fg = "#fb4934" }
perm_exec  = { fg = "#b8bb26" }
perm_sep   = { fg = "#665c54" }

# Progress
progress_label  = { fg = "#ebdbb2", bold = true }
progress_normal = { fg = "#504945", bg = "#3c3836" }
progress_error  = { fg = "#fb4934", bg = "#3c3836" }

# : }}}


# : Input {{{

[input]
border   = { fg = "#504945" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Picker {{{

[pick]
border   = { fg = "#504945" }
active   = { fg = "#fe8019" }
inactive = {}

# : }}}


# : Task manager {{{

[tasks]
border  = { fg = "#504945" }
title   = {}
hovered = { underline = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#3c3836" }
cand            = { fg = "#83a598" }
rest            = { fg = "#928374" }
desc            = { fg = "#fe8019" }
separator       = "  "
separator_style = { fg = "#504945" }

# : }}}


# : Help menu {{{

[help]
on      = { fg = "#fe8019" }
run     = { fg = "#83a598" }
desc    = { fg = "#928374" }
hovered = { bg = "#504945", bold = true }
footer  = { fg = "#3c3836", bg = "#a89984" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#83a598" },

    # Videos
    { mime = "video/*", fg = "#b8bb26" },
    { mime = "audio/*", fg = "#b8bb26" },

    # Archives
    { mime = "application/zip",             fg = "#fe8019" },
    { mime = "application/gzip",            fg = "#fe8019" },
    { mime = "application/tar",           fg = "#fe8019" },
    { mime = "application/bzip",          fg = "#fe8019" },
    { mime = "application/bzip2",         fg = "#fe8019" },
    { mime = "application/7z-compressed", fg = "#fe8019" },
    { mime = "application/rar",           fg = "#fe8019" },

    # Fallback
    { url = "*", fg = "#a89984" },
    { url = "*/", fg = "#83a598" }
]

# : }}}
