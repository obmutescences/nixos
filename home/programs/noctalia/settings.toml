[hooks]
wallpaper_changed = "sh /home/zerone/.config/kitty/run_reload_kitty.sh"

[location]
address = "GuangZhou"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 1280.0
    cy = 1317.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[notification]
background_opacity = 0.63999998569488525
position = "top_center"
scale = 0.85000000521540642

[plugin_settings."noctalia/ccal"]
refresh_interval = 2512

[plugin_settings."noctalia/screen_recorder"]
directory = ""
video_source = "focused"

[plugins]
enabled = [ "noctalia/example", "noctalia/bongocat", "noctalia/translator", "noctalia/screen_recorder", "noctalia/ccal" ]

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

    [[plugins.source]]
    kind = "path"
    location = "/home/zerone/.config/noctalia/plugins/"
    name = "ccal"

[shell]
app_icon_color = "primary"
app_icon_colorize = true
font_family = "Monofur Nerd Font Mono"
settings_show_advanced = true
telemetry_enabled = false
time_format = "{:%H:%M:%S}"

    [shell.animation]
    speed = 0.40000000596046448

    [shell.panel]
    borders = false
    launcher_session_search = true
    session_placement = "centered"
    shadow = false
    transparency_mode = "glass"
    wallpaper_placement = "centered"

    [shell.screen_corners]
    enabled = true
    size = 20

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "5"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.70999998413026333
    blur = 71
    direction = "center"

[theme]
builtin = "Rosé Pine"
community_palette = "Oxocarbon"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "faithful"

    [theme.templates]
    builtin_ids = [ "alacritty", "btop", "ghostty", "kitty" ]
    community_ids = [ "telegram" ]

[wallpaper]
directory = "/home/zerone/Pictures/Wallpapers"
fill_color = "primary"
transition_duration = 2000
transition_on_startup = true

    [wallpaper.automation]
    enabled = true
    interval_seconds = 3600
    order = "alphabetical"

    [wallpaper.default]
    path = "/home/zerone/Pictures/Wallpapers/0042.png"

    [wallpaper.last]
    path = "/home/zerone/Pictures/Wallpapers/0042.png"

    [wallpaper.monitor.DP-1]
    fill_color = "primary"

    [wallpaper.monitors.DP-1]
    path = "/home/zerone/Pictures/Wallpapers/0042.png"

[widget.calendar]
type = "noctalia/ccal:calendar"

[widget.clock]
color = "secondary"
font_weight = 700
format = "{:%H:%M:%S}"

[widget.ram]
stat = "ram_pct"

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.tray]
color = "primary"
icon_color = "primary"
scale = 0.85000000000000009