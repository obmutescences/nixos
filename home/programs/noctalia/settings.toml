[backdrop]
blur_intensity = 0.0
tint_intensity = 0.0

[bar.default]
background_opacity = 0.54999998770654202
capsule_fill = "hover"
capsule_foreground = "primary"
capsule_thickness = 0.99999998137354851
center = [ "clock", "calendar", "weather" ]
color = "primary"
end = [
    "network_rx",
    "network_tx",
    "tray",
    "notifications",
    "clipboard",
    "bluetooth",
    "volume",
    "brightness",
    "control-center",
    "session"
]
font_family = "Monofur Nerd Font Mono"
font_weight = 300
icon_color = "primary"
margin_edge = 6
margin_ends = 450
padding = 15
radius = 9
shadow = false
start = [ "wallpaper", "ram", "cpu", "workspaces", "audio_visualizer" ]
thickness = 24
widget_spacing = 10

    [[bar.default.capsule_group]]
    fill = "on_surface"
    foreground = "primary"
    id = "g1"
    members = [ "clock", "audio_visualizer" ]
    opacity = 1.0
    padding = 6.0

[control_center]
compact = false
sidebar = "full"
sidebar_section = "full"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "clipboard"

    [[control_center.shortcuts]]
    type = "wallpaper"

[desktop_widgets]
