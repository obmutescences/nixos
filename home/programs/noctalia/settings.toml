    type = "fancy_audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = false
        bar_width = 0.5
        bloom_intensity = 0.55000000000000004
        inner_diameter = 0.65000000000000002
        ring_opacity = 0.60000000000000009
        rotation_speed = 1.3
        sensitivity = 2.5
        visualization_mode = "bars_rings"

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 320.0
    box_width = 416.0
    cx = 2272.0
    cy = 272.0
    output = "DP-1"
    rotation = 0.0
    type = "weather"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        background = true
        background_color = "outline"
        background_opacity = 0.87
        background_padding = 24.0
        background_radius = 25.0
