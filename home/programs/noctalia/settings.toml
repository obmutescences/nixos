    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 1008.0
    box_width = 1136.0
    cx = 1208.0
    cy = 680.0
    output = "DP-1"
