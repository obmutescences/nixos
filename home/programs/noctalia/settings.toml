[notification]
background_opacity = 0.63999998569488525
position = "top_center"
scale = 0.85000000521540642

[plugin_settings."noctalia/ccal"]
events = [ "L 06-05 妈", "L 09-24 Dear", "L 10-30 恬", "L 04-12 爸" ]
refresh_interval = 2512

[plugin_settings."noctalia/screen_recorder"]
directory = ""
video_source = "focused"

[plugin_settings."noctalia/wallhaven"]
download_dir = ""

[plugins]
enabled = [ "noctalia/translator", "noctalia/screen_recorder", "noctalia/ccal", "noctalia/wallhaven", "nightwatch75/todo" ]

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

    [[plugins.source]]
    kind = "path"
    location = "/home/zerone/.config/noctalia/plugins/"
    name = "ccal"

[shell]
app_icon_color = "primary"
app_icon_colorize = true
clipboard_history_max_entries = 500
font_family = "Monofur Nerd Font Mono"
settings_show_advanced = true
telemetry_enabled = false
time_format = "{:%H:%M:%S}"

    [shell.animation]
    speed = 0.40000000596046448

    [shell.greeter_sync]
    auto_sync = true

    [shell.launcher]
    session_search = true

    [shell.panel]
    borders = false
    launcher_session_search = true
    session_placement = "centered"
    shadow = false
    transparency_mode = "glass"
    wallpaper_placement = "centered"

    [shell.screen_corners]
    enabled = true
    size = 20

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    enabled = true
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "5"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.70999998413026333
    blur = 71
    direction = "center"

[theme]
builtin = "Rosé Pine"
community_palette = "Oxocarbon"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "faithful"

    [theme.templates]
    builtin_ids = [ "btop", "cava", "gtk3", "gtk4", "ghostty", "kcolorscheme", "kitty", "qt" ]
    community_ids = [ "pi-agent", "telegram", "zathura" ]

[wallpaper]
directory = "/home/zerone/Pictures/Wallpapers"
fill_color = "primary"
transition_duration = 2000
transition_on_startup = true

    [wallpaper.automation]
    enabled = true
    interval_seconds = 3600
    order = "alphabetical"

    [wallpaper.default]
    path = "/home/zerone/Pictures/Wallpapers/0299.jpg"

    [wallpaper.last]
    path = "/home/zerone/Pictures/Wallpapers/0299.jpg"

    [wallpaper.monitor.DP-1]
    fill_color = "primary"

    [wallpaper.monitors.DP-1]
    path = "/home/zerone/Pictures/Wallpapers/0299.jpg"

