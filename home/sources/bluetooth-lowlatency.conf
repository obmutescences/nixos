# save path: /home/zerone/.config/pipewire/pipewire.conf.d/bluetooth-lowlatency.conf
context.properties = {
    # 基础量子：512 是蓝牙在桌面 Linux 的“甜点值”，兼顾延迟与抗抖动
    default.clock.quantum = 256
    # 允许动态调整，但严格限制上限，防止无限膨胀
    default.clock.min-quantum = 256
    default.clock.max-quantum = 512
	default.clock.quantum-limit = 512
    # 必须允许重采样：桌面音频源多为 48kHz，关闭会导致帧丢弃/爆音
    default.clock.allow-resampling = true
    # 保持 AAC 兼容的基准采样率
    default.clock.rate = 48000
}

# WirePlumber 策略（v0.4+ 标准）：仅对蓝牙设备生效
bluez5.properties = {
    bluez5.codecs = [ "aac", "ldac", "aptx_hd", "aptx", "sbc" ]
    bluez5.default.rate = 44100
    bluez5.headset-roles = [ "hsp_hs", "hfp_hf" ]
}
